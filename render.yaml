services:
  - type: web
    name: plan-treningowy-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_SECRET
        sync: false # ustaw recznie w Render Dashboard -> Environment (wartosc: PlanTreningowy)
      - key: DATABASE_URL
        sync: false # ustaw recznie: connection string z Neon (postgresql://...neon.tech/...?sslmode=require)

# Baza NIE jest hostowana na Renderze (darmowy Render Postgres kasuje dane po 30
# dniach - nie do przyjecia dla dziennika treningowego). Zamiast tego uzywamy
# Neon (neon.tech) - darmowy Postgres bez limitu czasowego, dane nie znikaja same
# (tylko compute usypia po bezczynnosci i budzi sie przy nastepnym polaczeniu).
# Render hostuje wylacznie sam serwis FastAPI (bezstanowy, wiec efemeryczny dysk
# darmowego web service nie ma juz znaczenia) i laczy sie z Neon przez internet
# (DATABASE_URL powyzej).
