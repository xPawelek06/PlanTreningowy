services:
  - type: web
    name: plan-treningowy-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_SECRET
        sync: false # ustaw recznie w Render Dashboard -> Environment (wartosc: PlanTreningowy)
      - key: DATABASE_URL
        fromDatabase:
          name: plan-treningowy-db
          property: connectionString

databases:
  - name: plan-treningowy-db
    plan: free
    databaseName: plantreningowy
    user: plantreningowy
